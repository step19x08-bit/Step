    <style>
        * {

        html, body {

        body::before {
            content: "";

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 40%, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.45) 80%, rgba(0,0,0,0.6) 100%);
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjgiIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDMiLz48L3N2Zz4=');
            background-repeat: repeat;
            opacity: 0.18;
            pointer-events: none;
            z-index: 0;
        }

        .glass-card {
            max-width: 560px;
            width: 100%;
            height: auto;
            max-height: 98vh;
            background: rgba(14, 18, 28, 0.78);
            backdrop-filter: blur(14px);
            border-radius: clamp(1.5rem, 5vh, 2.5rem);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.08);
            padding: clamp(0.8rem, 2vh, 1.2rem) clamp(1rem, 3vw, 1.5rem) clamp(0.8rem, 2vh, 1.2rem);
            transition: transform 0.2s ease;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            position: relative;
            z-index: 2;
        }

        .glass-card::-webkit-scrollbar {
            display: none;
        }

        .glass-card:hover {
            transform: scale(1.01);
        }

        .profile {
            text-align: center;
            margin-bottom: clamp(0.5rem, 1.5vh, 0.8rem);
        }

        .avatar {
            width: clamp(55px, 12vh, 70px);
            height: clamp(55px, 12vh, 70px);
            margin: 0 auto clamp(0.3rem, 1vh, 0.5rem);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            overflow: hidden;
            background: linear-gradient(135deg, #2a3b5c, #1a2538);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        h1 {
            font-size: clamp(1.2rem, 5vh, 1.6rem);
            font-weight: 700;
            background: linear-gradient(120deg, #ffffff, #cddefc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .sub {
            color: #f0e3dc;
            margin-top: 0.2rem;
            font-weight: 500;
            font-size: clamp(0.65rem, 2vh, 0.8rem);
            border-bottom: 1px dashed rgba(255, 220, 200, 0.5);
            display: inline-block;
            padding-bottom: 3px;
            letter-spacing: 0.3px;
        }

        .social-grid {
            display: flex;
            flex-direction: column;
            gap: clamp(0.45rem, 1.2vh, 0.65rem);
            margin: clamp(0.5rem, 2vh, 0.8rem) 0 clamp(0.5rem, 1.5vh, 0.7rem);
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(8, 12, 20, 0.7);
            backdrop-filter: blur(4px);
            border-radius: clamp(1.2rem, 4vh, 1.8rem);
            padding: clamp(0.4rem, 1.2vh, 0.55rem) clamp(0.9rem, 2.5vw, 1.2rem);
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .social-link:hover {
            transform: translateY(-2px);
            background: rgba(25, 35, 55, 0.9);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 10px 18px -10px rgba(0, 0, 0, 0.5);
        }

        .left-info {
            display: flex;
            align-items: center;
            gap: clamp(0.6rem, 2vw, 0.9rem);
        }

        .icon-circle {
            width: clamp(34px, 7vh, 42px);
            height: clamp(34px, 7vh, 42px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1rem, 3vh, 1.4rem);
            transition: transform 0.2s, box-shadow 0.2s;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            flex-shrink: 0;
            line-height: 1;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .icon-circle i {
            display: block;
            line-height: 1;
            margin: 0;
            padding: 0;
            position: relative;
            z-index: 2;
        }

        .gradient-youtube { background: linear-gradient(135deg, #FF0000, #CC0000, #8B0000); box-shadow: 0 2px 6px rgba(255, 0, 0, 0.3); }
        .gradient-tiktok { background: #000000; position: relative; box-shadow: none; }
        .gradient-tiktok::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #00f2ea 0%, #00f2ea 20%, #ff0050 50%, #ff0050 70%, #000000 100%); opacity: 0.7; border-radius: 50%; z-index: 1; }
        .gradient-tiktok::after { content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; background: #000000; border-radius: 50%; z-index: 1; }
        .gradient-tiktok i { position: relative; z-index: 3; color: white; text-shadow: 0 0 2px rgba(0,242,234,0.5); }
        .gradient-instagram { background: radial-gradient(circle at 30% 110%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); box-shadow: 0 2px 8px rgba(214, 36, 159, 0.3); }
        .gradient-twitter { background: linear-gradient(135deg, #1DA1F2, #0d8bd9, #0a6ab3); box-shadow: 0 2px 6px rgba(29, 161, 242, 0.3); }
        .gradient-telegram { background: linear-gradient(135deg, #0088cc, #2aabee, #0077b5); box-shadow: 0 2px 6px rgba(0, 136, 204, 0.3); }
        .gradient-twitch { background: linear-gradient(135deg, #9146FF, #772ce8, #5a1fb0); box-shadow: 0 2px 6px rgba(145, 70, 255, 0.3); }
        .gradient-vk { background: linear-gradient(135deg, #4C75A3, #2a4d7a, #1b3557); box-shadow: 0 2px 6px rgba(76, 117, 163, 0.3); }
        .gradient-steam { background: linear-gradient(135deg, #1b2838, #2c3e4e, #171a21); box-shadow: 0 2px 6px rgba(27, 40, 56, 0.4); border: 1px solid rgba(102, 192, 244, 0.2); }

        .social-link:hover .icon-circle { transform: scale(1.04); }
        .social-name { font-weight: 600; font-size: clamp(0.8rem, 2.5vh, 0.95rem); letter-spacing: -0.2px; color: #f0f4fe; }
        .arrow-icon { color: #a0b0d0; font-size: clamp(0.75rem, 2.5vh, 0.9rem); transition: transform 0.2s, color 0.2s; }
        .social-link:hover .arrow-icon { transform: translateX(4px); color: white; }

        .footer-note { text-align: center; margin-top: clamp(0.2rem, 1vh, 0.4rem); padding-top: clamp(0.3rem, 1.5vh, 0.6rem); border-top: 1px solid rgba(255,255,255,0.08); }
        .social-row { display: flex; justify-content: center; align-items: center; gap: clamp(0.4rem, 2vw, 0.8rem); flex-wrap: wrap; row-gap: 0.3rem; }
        .mini-icon-gray { color: #cfc1b8; font-size: clamp(0.7rem, 2.5vh, 0.85rem); transition: color 0.2s, transform 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .mini-icon-gray:hover { color: #f5ede8; transform: translateY(-1px); }
        .footer-text { font-size: clamp(0.65rem, 2vh, 0.75rem); font-weight: 500; letter-spacing: 0.5px; color: #e0d4cd; display: inline-flex; align-items: center; margin-left: 2px; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .social-link { animation: fadeUp 0.3s ease backwards; }
        .social-link:nth-child(1) { animation-delay: 0.02s; }
        .social-link:nth-child(2) { animation-delay: 0.05s; }
        .social-link:nth-child(3) { animation-delay: 0.08s; }
        .social-link:nth-child(4) { animation-delay: 0.11s; }
        .social-link:nth-child(5) { animation-delay: 0.14s; }
        .social-link:nth-child(6) { animation-delay: 0.17s; }
        .social-link:nth-child(7) { animation-delay: 0.2s; }
        .social-link:nth-child(8) { animation-delay: 0.23s; }

        @media (max-height: 700px) {

        }
        @media (max-width: 450px) { .left-info { gap: 0.6rem; } .icon-circle { width: 36px; height: 36px; font-size: 1.1rem; } }

<script>
    let audioContext = null;
    function playSoftHoverSound() {
        try {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (audioContext.state === 'suspended') audioContext.resume();
            const now = audioContext.currentTime;
            const oscLow = audioContext.createOscillator();
            const gainLow = audioContext.createGain();
            oscLow.connect(gainLow);
            gainLow.connect(audioContext.destination);
            oscLow.type = 'sine';
            oscLow.frequency.value = 220;
            gainLow.gain.setValueAtTime(0.06, now);
            gainLow.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
            const oscMid = audioContext.createOscillator();
            const gainMid = audioContext.createGain();
            oscMid.connect(gainMid);
            gainMid.connect(audioContext.destination);
            oscMid.type = 'sine';
            oscMid.frequency.value = 440;
            gainMid.gain.setValueAtTime(0.035, now);
            gainMid.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
            oscLow.start(now);
            oscLow.stop(now + 0.3);
            oscMid.start(now);
            oscMid.stop(now + 0.25);
        } catch(e) {}
    }
    document.querySelectorAll('.social-link').forEach(link => {
        link.addEventListener('mouseenter', () => playSoftHoverSound());
        link.addEventListener('mouseenter', () => { if(navigator.vibrate) navigator.vibrate(10); });
    });
</script>
